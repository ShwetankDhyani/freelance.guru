<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | freelance.guru</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
    <div class="container header-content">
        <a href="index.html" class="logo-wrapper">
            <img src="logo-guru.png" alt="freelance.guru" class="site-logo">
            <span class="brand-name">freelance.guru</span>
        </a>

        <button class="mobile-toggle" onclick="toggleMenu()">☰</button>

        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">The Guru Way</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        
        <div class="header-cta">
            <a href="contact.html" class="btn btn-primary">Start Project</a>
        </div>
    </div>
</header>

    <section class="page-header animate-in">
        <div class="container">
            <h1>Summon the <span class="highlight">Guru</span></h1>
            <p>Tell us about your project.</p>
        </div>
    </section>

    <section class="section">
        <div class="container animate-in delay-1">
            <div class="form-container">
                <form>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" class="form-control" placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea class="form-control" placeholder="How can we help?"></textarea>
                    </div>
                    <button type="button" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="site-footer">
        <div class="container"><p class="copyright">&copy; 2026 freelance.guru.</p></div>
    </footer>

    <script>
    function toggleMenu() {
        const nav = document.querySelector('.main-nav');
        nav.classList.toggle('active');
    }
</script>

</body>
</html>
